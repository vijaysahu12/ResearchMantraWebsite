<section class="feature-section">
    <div class="feature-container">

        <!-- LEFT SIDE (STICKY PHONE) -->
        <div class="phone-wrapper">
            <div class="image-stack">
                @for (section of sections(); track section.id; let i = $index) {
                <img [src]="section.image" [class.active]="i === activeIndex()" alt="Feature screenshot"
                    class="phone-image">
                }
            </div>
        </div>

        <!-- RIGHT SIDE (SCROLL CONTENT) -->
        <div class="content-wrapper">
            @for (section of sections(); track section.id; let i = $index) {
            <div class="feature-block" [attr.data-index]="i">
                <!-- Mobile Visual (Visible only on tablets/mobile) -->
                <div class="mobile-visual">
                    <img [src]="section.image" alt="Feature screenshot" class="mobile-feature-img">
                </div>

                <h2 class="section-title">{{ section.title }}</h2>
                <ul class="feature-list">
                    @for (item of section.items; track item) {
                    <li>
                        <span class="bullet-icon">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </span>
                        {{ item }}
                    </li>
                    }
                </ul>
            </div>
            }
        </div>

    </div>
</section>
